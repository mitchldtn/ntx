name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Build
        run: cargo build --release --target aarch64-apple-darwin -p rbk

      - name: Package
        run: |
          tar czf rbk-aarch64-apple-darwin.tar.gz \
            -C target/aarch64-apple-darwin/release rbk

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: rbk-aarch64-apple-darwin.tar.gz
