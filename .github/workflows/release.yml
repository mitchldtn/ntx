name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p ntx

      - name: Package
        run: |
          tar czf ntx-${{ matrix.target }}.tar.gz \
            -C target/${{ matrix.target }}/release ntx

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ntx-${{ matrix.target }}.tar.gz
